{% extends "secure_notes/base.html" %}
{% load django_bootstrap5 %}

{% block page_header %}
    <h2 class="h2">Delete Account</h2>
{% endblock page_header %}
{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-sm-12 col-md-10 col-lg-8">
            <div class="card shadow-sm mb-3">
                <div class="card-body">
    <div class="alert alert-info">
    Please enter your your username and password to confirm account deletion.
    </div>
    <hr class="mb-4">
    <form action="{% url 'accounts:delete_account' %}" method="post">
        {% csrf_token %}
        {% bootstrap_form form %}
        <div class="mt-3">
        <button type="submit" class="btn btn-danger">Delete Account</button>
        <button type="button" class="btn btn-secondary" onclick="location.href='{% url 'secure_notes:dashboard' %}'">Cancel</button>
        </div>
    </form>
    </div>
    </div>
    </div>
    </div>
    
    

    {% endblock content %}
